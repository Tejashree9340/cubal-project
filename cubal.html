<!DOCTYPE html>
<html>
<head>
    <title>CubaL Emergency Network</title>
    <link rel="stylesheet" href="cubal.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <h2>❤️ CubaL</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#donate">Donate</a>
        <a href="#request">Request</a>
    </nav>
    <button class="emergency">Emergency Portal</button>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Every Second <span>Counts.</span></h1>
    <p>Connect. Donate. Save a Life.</p>
    <div class="hero-btns">
        <button>Register as Donor</button>
        <button class="outline">Request Help</button>
    </div>
</section>

<!-- DONATION SECTION -->
<section id="donate" class="section">

    <div class="left">
        <h2>Become a <span>Guardian.</span></h2>
        <p>Your donation can save lives instantly.</p>
    </div>

    <div class="form">
        <input type="text" placeholder="Full Name">
        <input type="text" placeholder="Blood Group">
        <input type="text" placeholder="City">
        <input type="text" placeholder="Phone Number">
        <textarea placeholder="Medical Info"></textarea>
        <button>Complete Registration</button>
    </div>

</section>

<!-- REQUEST SECTION -->
<section id="request" class="section">

    <h2>Raise an Emergency Request</h2>

    <div class="form wide">
        <input type="text" placeholder="Blood Type Needed">
        <input type="text" placeholder="City">
        <input type="text" placeholder="Hospital Name">
        <button>Broadcast Request</button>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 CubaL Emergency Network</p>
</footer>

</body>
</html>
